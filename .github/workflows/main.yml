name: Build Fully Static SSHFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Build using musl-cross
        run: |
          # Устанавливаем musl-gcc
          sudo apt-get update
          sudo apt-get install -y musl-tools git meson ninja-build pkg-config
          
          # Скачиваем и собираем статический glib
          git clone https://github.com/GNOME/glib.git
          cd glib
          meson setup build --prefix=/usr/local --default-library=static
          ninja -C build
          sudo ninja -C build install
          cd ..
          
          # Скачиваем и собираем статический fuse3
          git clone https://github.com/libfuse/libfuse.git
          cd libfuse
          meson setup build --prefix=/usr/local --default-library=static
          ninja -C build
          sudo ninja -C build install
          cd ..
          
          # Собираем sshfs статически
          git clone https://github.com/libfuse/sshfs.git
          cd sshfs
          git checkout sshfs-3.7.5
          mkdir build && cd build
          
          CC=musl-gcc \
          PKG_CONFIG_PATH=/usr/local/lib/pkgconfig \
          LDFLAGS="-static -pthread" \
          CFLAGS="-Os -static" \
          meson setup .. \
            --prefix=/usr/local \
            --default-library=static \
            --buildtype=release
          
          ninja
          
          # Проверяем
          file sshfs
          ldd sshfs || echo "Fully static"
          
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sshfs-static-musl
          path: sshfs/build/sshfs
