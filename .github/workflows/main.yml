FROM alpine:latest AS builder

# Устанавливаем все необходимые пакеты, включая статические библиотеки PCRE2
RUN apk add --no-cache \
    alpine-sdk \
    fuse3-dev \
    fuse3-static \
    glib-dev \
    glib-static \
    meson \
    ninja \
    git \
    pkgconfig \
    musl-dev \
    linux-headers \
    pcre2-dev \
    pcre2-static

# Клонируем и собираем SSHFS
RUN git clone https://github.com/libfuse/sshfs.git /tmp/sshfs && \
    cd /tmp/sshfs && \
    git checkout sshfs-3.7.5 && \
    mkdir build && cd build && \
    # Явно указываем pkg-config путь к статическим библиотекам
    export PKG_CONFIG_PATH=/usr/lib/pkgconfig && \
    LDFLAGS="-static -static-libgcc -no-pie" \
    CFLAGS="-Os -static -I/usr/include/pcre2" \
    meson setup \
        --prefix=/usr \
        --buildtype=release \
        --default-library=static \
        -Dpcre2:static=true \
        .. && \
    ninja && \
    # Проверка, что бинарник статический
    file sshfs | grep -q "statically linked" && \
    echo "✓ Бинарник статически слинкован"

# Финальный этап: копируем только бинарник
FROM scratch
COPY --from=builder /tmp/sshfs/build/sshfs /sshfs
ENTRYPOINT ["/sshfs"]
