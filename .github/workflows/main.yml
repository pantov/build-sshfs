name: Build Static SSHFS

on:
  push:
    paths:
      - '.github/workflows/build-sshfs.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: alpine:latest
    
    steps:
      - name: Install build dependencies
        run: |
          apk add --no-cache \
            alpine-sdk \
            fuse3-dev \
            fuse3-static \
            glib-dev \
            glib-static \
            meson \
            ninja \
            git \
            pkgconfig \
            musl-dev \
            libc-dev \
            linux-headers

      - name: Clone SSHFS source
        run: |
          git clone https://github.com/libfuse/sshfs.git
          cd sshfs
          git checkout sshfs-3.7.5

      - name: Build static binary
        run: |
          cd sshfs
          mkdir build && cd build
          
          # Явно указываем пути к статическим библиотекам
          export PKG_CONFIG_PATH=/usr/lib/pkgconfig
          export LDFLAGS="-static -static-libgcc -no-pie -Wl,-Bstatic"
          export CFLAGS="-Os -static"
          
          meson setup \
            --prefix=/usr \
            --buildtype=release \
            --default-library=static \
            -Dfuse3:static=true \
            -Dglib:static=true \
            ..
          
          # Правим meson.build, если нужно
          sed -i 's/-Wl,--start-group/-Wl,--start-group -Wl,-Bstatic/g' build.ninja
          
          ninja

      - name: Verify static binary
        run: |
          cd sshfs/build
          file sshfs
          ldd sshfs || echo "Statically linked (no dynamic dependencies)"
          ./sshfs --version || echo "Binary created but needs testing"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshfs-static
          path: sshfs/build/sshfs
