name: Build Static SSHFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            meson \
            ninja-build \
            pkg-config \
            libfuse3-dev \
            libglib2.0-dev \
            libpcre2-dev \
            gcc \
            make

      - name: Clone SSHFS source
        run: |
          git clone https://github.com/libfuse/sshfs.git
          cd sshfs
          git checkout sshfs-3.7.5

      - name: Build static SSHFS
        run: |
          cd sshfs
          mkdir build && cd build
          
          export LDFLAGS="-static -pthread"
          export CFLAGS="-Os -static"
          
          meson setup \
            --prefix=/usr \
            --buildtype=release \
            --default-library=static \
            ..
          
          ninja

      - name: Verify static binary
        run: |
          cd sshfs/build
          file sshfs
          ldd sshfs || echo "✓ Static binary - no dynamic dependencies"
          ./sshfs --version
          ls -lh sshfs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshfs-static
          path: sshfs/build/sshfs
          retention-days: 90
